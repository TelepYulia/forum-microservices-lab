version: '3.8'

services:
  user-service:
    build: ./user-service
    ports:
      - "8016:8016"
    command: uvicorn main:app --host 0.0.0.0 --port 8016
    environment:
      - PYTHONUNBUFFERED=1

  forum-service:
    build: ./forum-service
    ports:
      - "9016:9016"
    command: uvicorn main:app --host 0.0.0.0 --port 9016
    environment:
      - PYTHONUNBUFFERED=1